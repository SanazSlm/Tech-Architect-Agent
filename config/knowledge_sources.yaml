# Read-only knowledge sources for Houram, the Tech Architect Agent.
# The optional CLI uses these paths to build a local advisor index.
# Paths below match the DeepReading workspace layout; adjust roots if your clones live elsewhere.

index_name: ordelex_technical_architecture

sources:
  - name: advisor_context
    root: /Users/sanazslm/Documents/DeepReading/Tech Architect Agent
    globs:
      - AGENTS.md
      - prompts/*.md
      - knowledge/*.md

  - name: ordelex_product_documents
    root: /Users/sanazslm/Documents/DeepReading/Ordelex/Documents
    globs:
      - "*.md"
      - "*.plan.md"
      - "*.txt"

  - name: ordelex_core
    root: /Users/sanazslm/Documents/DeepReading/Ordelex/ordelex-core
    globs:
      - README.md
      - "**/*.py"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/*.toml"
    exclude:
      - ".venv/**"
      - "data/**"
      - "books/**"
      - "__pycache__/**"

  - name: ordelex_admin
    root: /Users/sanazslm/Documents/DeepReading/Ordelex/ordelex-admin
    globs:
      - README.md
      - AGENTS.md
      - "app/**/*.ts"
      - "app/**/*.tsx"
      - "lib/**/*.ts"
      - "features/**/*.md"
    exclude:
      - "node_modules/**"
      - ".next/**"
      - "coverage/**"

  - name: ordelex_ui
    root: /Users/sanazslm/Documents/DeepReading/Ordelex/ordelex-ui
    globs:
      - README.md
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.md"
    exclude:
      - "node_modules/**"
      - ".next/**"
      - "coverage/**"

  - name: ordelex_evals
    root: /Users/sanazslm/Documents/DeepReading/ordelex-evals
    globs:
      - README.md
      - "**/*.py"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/*.md"
    exclude:
      - ".venv/**"
      - "__pycache__/**"

  - name: ordelex_evals_review
    root: /Users/sanazslm/Documents/DeepReading/ordelex-evals-review
    globs:
      - README.md
      - "**/*.py"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/*.md"
    exclude:
      - ".venv/**"
      - "__pycache__/**"
